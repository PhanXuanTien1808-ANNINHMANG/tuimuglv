<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trang Quản Lý Admin - Túi Mù Giáo Lý</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Mở rộng khung container riêng cho Admin */
    .admin-container {
      max-width: 850px !important;
      width: 95%;
    }

    /* Thanh công cụ Admin */
    .admin-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .btn-action {
      padding: 10px 18px;
      border: none;
      border-radius: 20px;
      font-weight: bold;
      font-size: 0.85rem;
      cursor: pointer;
      transition: transform 0.2s, background-color 0.2s;
    }
    .btn-action:hover { transform: scale(1.03); }

    .btn-add { background: #00b894; color: white; }
    .btn-reset-selected { background: #d63031; color: white; }
    .btn-reset-all { background: #6c5ce7; color: white; }

    /* Bảng danh sách */
    .table-responsive {
      max-height: 400px;
      overflow-y: auto;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      text-align: left;
    }

    th, td {
      padding: 12px 15px;
      font-size: 0.9rem;
      border-bottom: 1px solid #dfe6e9;
      vertical-align: middle;
    }

    th {
      background: #0984e3;
      color: white;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .badge {
      padding: 5px 10px;
      border-radius: 12px;
      font-size: 0.78rem;
      font-weight: bold;
      display: inline-block;
    }
    .badge-success { background: #55efc4; color: #00b894; }
    .badge-warning { background: #ffeaa7; color: #d63031; }

    /* Modal Form (Thêm / Sửa GLV) */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(5px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .modal-box {
      background: white;
      padding: 25px;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      text-align: left;
    }

    .modal-box h3 { margin-bottom: 15px; color: #2d3436; }
    .modal-box label { font-size: 0.85rem; font-weight: bold; color: #636e72; }
    .modal-box input {
      width: 100%;
      padding: 10px;
      margin: 5px 0 15px 0;
      border: 1.5px solid #dfe6e9;
      border-radius: 10px;
    }

    .btn-group { display: flex; gap: 10px; justify-content: flex-end; }
  </style>
</head>
<body>

  <div class="main-container admin-container">
    <h1 class="title">TRANG QUẢN LÝ (ADMIN)</h1>
    <p class="subtitle">Thêm/Sửa lớp đợt này và quản lý trạng thái mở rương</p>

    <div class="admin-actions">
      <div>
        <button class="btn-action btn-add" onclick="openModal()">➕ Thêm GLV Mới</button>
      </div>
      <div style="display: flex; gap: 8px;">
        <button class="btn-action btn-reset-selected" onclick="resetSelectedGLV()">🔄 Reset Mục Đã Chọn</button>
        <button class="btn-action btn-reset-all" onclick="resetAllGLV()">⚠️ Reset Tất Cả</button>
      </div>
    </div>

    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th style="width: 40px; text-align: center;">
              <input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)">
            </th>
            <th>Họ và Tên</th>
            <th>Lớp Đợt Này</th>
            <th>Trạng Thái</th>
            <th style="text-align: center;">Hành Động</th>
          </tr>
        </thead>
        <tbody id="userTableBody">
          </tbody>
      </table>
    </div>

    <button class="logout-link" onclick="handleLogout()">Đăng xuất</button>
  </div>

  <div id="userModal" class="modal-overlay hidden">
    <div class="modal-box">
      <h3 id="modalTitle">Thêm Giáo Lý Viên</h3>
      <form id="userForm" onsubmit="saveUser(event)">
        <input type="hidden" id="editUserId">

        <label for="inputFullname">Họ và Tên GLV</label>
        <input type="text" id="inputFullname" placeholder="Ví dụ: Phan Xuân Tiến" required>

        <label for="inputUsername">Tên đăng nhập (Username)</label>
        <input type="text" id="inputUsername" placeholder="Ví dụ: phanxuantien" required>

        <label for="inputPassword">Mật khẩu</label>
        <input type="password" id="inputPassword" placeholder="Mật khẩu..." required>

        <label for="inputClass">Lớp Phân Công (Đợt Này)</label>
        <input type="text" id="inputClass" placeholder="Ví dụ: Nghĩa 1A" required>

        <div class="btn-group">
          <button type="button" class="btn-action" style="background:#b2bec3; color:white;" onclick="closeModal()">Hủy</button>
          <button type="submit" class="btn-action btn-add">Lưu Lại</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let usersData = [];

    // Tải danh sách GLV
    async function loadUsers() {
      try {
        const res = await fetch('/api/admin/users');
        usersData = await res.json();
        renderTable(usersData);
      } catch (err) {
        alert('Lỗi tải danh sách!');
      }
    }

    // Hiển thị bảng (Đã loại bỏ cột Tên ĐN)
    function renderTable(users) {
      const tbody = document.getElementById('userTableBody');
      tbody.innerHTML = '';

      users.filter(u => u.role !== 'admin').forEach(user => {
        const isOpened = user.opened;
        const row = document.createElement('tr');
        row.innerHTML = `
          <td style="text-align: center;">
            <input type="checkbox" class="user-checkbox" value="${user._id || user.id}">
          </td>
          <td><strong>${user.fullname}</strong></td>
          <td><span style="color:#d63031; font-weight:bold;">${user.className || 'Chưa gán'}</span></td>
          <td>
            <span class="badge ${isOpened ? 'badge-success' : 'badge-warning'}">
              ${isOpened ? 'Đã Mở' : 'Chưa Mở'}
            </span>
          </td>
          <td style="text-align: center;">
            <button class="btn-action" style="background:#ffeaa7; color:#d63031; padding: 5px 10px;" onclick="openModalEdit('${user._id || user.id}')">✏️ Sửa Lớp/Tên</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    // Chọn tất cả
    function toggleSelectAll(master) {
      const checkboxes = document.querySelectorAll('.user-checkbox');
      checkboxes.forEach(cb => cb.checked = master.checked);
    }

    // Reset các mục đã chọn
    async function resetSelectedGLV() {
      const selectedIds = Array.from(document.querySelectorAll('.user-checkbox:checked')).map(cb => cb.value);
      
      if (selectedIds.length === 0) {
        alert('Vui lòng tích chọn ít nhất 1 Giáo Lý Viên để reset!');
        return;
      }

      if (!confirm(`Bạn có chắc muốn reset trạng thái của ${selectedIds.length} người đã chọn?`)) return;

      try {
        const res = await fetch('/api/admin/reset-selected', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userIds: selectedIds })
        });
        
        if (res.ok) {
          alert('Đã reset thành công các mục đã chọn!');
          document.getElementById('selectAll').checked = false;
          loadUsers();
        }
      } catch (err) {
        alert('Có lỗi xảy ra khi reset!');
      }
    }

    // Reset tất cả
    async function resetAllGLV() {
      if (!confirm('Bạn có chắc chắn muốn Reset trạng thái rương của TẤT CẢ GLV?')) return;
      try {
        const res = await fetch('/api/admin/reset-all', { method: 'POST' });
        if (res.ok) {
          alert('Đã reset toàn bộ GLV!');
          loadUsers();
        }
      } catch (err) { alert('Lỗi hệ thống!'); }
    }

    // Mở Modal Thêm mới
    function openModal() {
      document.getElementById('editUserId').value = '';
      document.getElementById('modalTitle').innerText = 'Thêm Giáo Lý Viên Mới';
      document.getElementById('userForm').reset();
      document.getElementById('inputPassword').required = true;
      document.getElementById('userModal').classList.remove('hidden');
    }

    // Mở Modal Chỉnh Sửa
    function openModalEdit(id) {
      const user = usersData.find(u => (u._id || u.id) == id);
      if (!user) return;

      document.getElementById('editUserId').value = id;
      document.getElementById('modalTitle').innerText = 'Chỉnh Sửa Thông Tin / Đổi Lớp';
      document.getElementById('inputFullname').value = user.fullname;
      document.getElementById('inputUsername').value = user.username;
      document.getElementById('inputClass').value = user.className || '';
      document.getElementById('inputPassword').required = false;
      document.getElementById('userModal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('userModal').classList.add('hidden');
    }

    // Lưu thông tin
    async function saveUser(e) {
      e.preventDefault();
      const id = document.getElementById('editUserId').value;
      const body = {
        fullname: document.getElementById('inputFullname').value.trim(),
        username: document.getElementById('inputUsername').value.trim(),
        className: document.getElementById('inputClass').value.trim(),
        password: document.getElementById('inputPassword').value.trim()
      };

      const url = id ? `/api/admin/users/${id}` : '/api/admin/users';
      const method = id ? 'PUT' : 'POST';

      try {
        const res = await fetch(url, {
          method: method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        if (res.ok) {
          alert(id ? 'Cập nhật thành công!' : 'Thêm mới thành công!');
          closeModal();
          loadUsers();
        } else {
          const errData = await res.json();
          alert(errData.message || 'Lỗi thao tác!');
        }
      } catch (err) {
        alert('Không thể kết nối máy chủ!');
      }
    }

    function handleLogout() {
      localStorage.removeItem('currentUser');
      window.location.href = '/login.html';
    }

    loadUsers();
  </script>
</body>
</html>
