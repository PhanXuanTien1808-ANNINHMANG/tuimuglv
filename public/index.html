<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nhiệm Vụ Hệ Thống</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    /* Bổ sung CSS chống đơ vuốt di động ngay trong trang */
    html, body {
      overflow-y: auto !important;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
    }
    .letter-overlay {
      overflow-y: auto !important;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
    }
    .letter-card {
      max-height: 85vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
  </style>
</head>
<body>

  <!-- Chặn truy cập nếu chưa đăng nhập -->
  <script>
    const user = JSON.parse(localStorage.getItem('currentUser'));
    if (!user) {
      window.location.href = 'login.html';
    }
  </script>

  <div class="main-container">
    <div class="welcome-card">
      <h3>Xin chào <span id="userName">...</span>! 👋</h3>
      <p>Chào mừng bạn đến với chương trình nhận lớp năm học mới!</p>
    </div>

    <h1 class="title">NHIỆM VỤ HỆ THỐNG</h1>
    <p class="subtitle" id="instructionText">Chạm vào Rương Báu để mở Lá Thư Phân Công!</p>

    <!-- RƯƠNG KHO BÁU -->
    <div class="chest-wrapper" id="chestWrapper" onclick="openChest()">
      <div class="treasure-chest" id="treasureChest">
        <div class="chest-lid"><div class="lid-band"></div></div>
        <div class="chest-body"><div class="body-band"></div><div class="lock">🔑</div></div>
      </div>
    </div>

    <!-- NÚT XEM LẠI THƯ -->
    <div id="reopenContainer" class="hidden" style="margin-top: 15px;">
      <button class="btn-primary" onclick="showLetter()" style="background: #00b894; box-shadow: 0 4px 12px rgba(0, 184, 148, 0.3);">📜 Xem Lại Phân Công</button>
    </div>

    <div>
      <button class="logout-link" onclick="logout()">Đăng xuất</button>
    </div>
  </div>

  <!-- POPUP LÁ THƯ CUỘN NẰM NGANG -->
  <div class="letter-overlay hidden" id="letterOverlay">
    <div class="letter-card">
      <h2 class="title-gold">PHÂN CÔNG NĂM HỌC MỚI</h2>
      <h3 class="year-subtitle">2026 - 2027</h3>

      <!-- Tấm cuộn thư nằm ngang -->
      <div class="scroll-canvas">
        <div class="scroll-content">
          <!-- Thông tin bản thân -->
          <div class="my-info">
            <span class="role-badge">CHI ĐOÀN</span>
            <h1 class="class-name" id="letterClass">---</h1>
            <p class="my-name">
              <span id="letterHolyName"></span> <b id="letterFullname">---</b>
            </p>
            <p class="sub-role" id="letterSubrole">---</p>
          </div>

          <hr class="divider">

          <!-- Khung hiển thị Anh/Chị cùng lớp -->
          <div class="teammates-box">
            <p class="teammates-title">🤝 <b>Anh/Chị cùng lớp:</b></p>
            <ul id="teammatesList" class="teammates-list">
              <!-- Danh sách đồng đội sẽ tự động load vào đây -->
            </ul>
          </div>
        </div>
      </div>

      <button class="btn-close-letter" onclick="closeLetter()">Đóng</button>
    </div>
  </div>

<script>
  const userId = user.id || user._id;

  // 🌟 1. CẬP NHẬT LỜI CHÀO CÓ TÊN THÁNH VÀ CHỮ TRƯỞNG
  function updateWelcomeName(userInfo) {
    const holy = userInfo.holyName || userInfo.holyname ? (userInfo.holyName || userInfo.holyname) + ' ' : '';
    const fullName = userInfo.fullname || userInfo.fullName || userInfo.name || '';
    const displayName = `Trưởng ${holy}${fullName}`.trim();
    document.getElementById('userName').innerText = displayName;
  }

  // Khởi tạo tên ban đầu
  updateWelcomeName(user);

  // Biến lưu danh sách đồng đội tạm thời
  let currentTeammates = [];

  // 2. ĐỒNG BỘ TRẠNG THÁI KHI VÀO TRANG
  async function checkCurrentStatus() {
    if (!userId) return;

    try {
      const res = await fetch(`/api/chest/status/${userId}`);
      if (res.ok) {
        const data = await res.json();
        
        Object.assign(user, data.user || data);
        currentTeammates = data.teammates || []; 
        localStorage.setItem('currentUser', JSON.stringify(user));

        // Cập nhật lại Lời chào sau khi đồng bộ dữ liệu mới nhất
        updateWelcomeName(user);

        const targetClass = user.className || user.chidoan;
        if (user.opened) {
          renderOpenedState(targetClass);
        } else {
          renderClosedState();
        }
      }
    } catch (err) {
      console.error('Lỗi kết nối máy chủ:', err);
      if (user.opened) renderOpenedState(user.className || user.chidoan);
    }
  }

  // 3. MỞ RƯƠNG
  async function openChest() {
    if (user.opened) {
      showLetter();
      return;
    }

    const chestWrapper = document.getElementById('chestWrapper');
    chestWrapper.classList.add('shaking');

    try {
      const res = await fetch('/api/chest/open', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: userId })
      });

      const data = await res.json();

      if (!res.ok) {
        chestWrapper.classList.remove('shaking');
        alert(data.message || 'Lỗi khi mở rương!');
        return;
      }

      setTimeout(() => {
        chestWrapper.classList.remove('shaking');

        user.opened = true;
        Object.assign(user, data.user);
        currentTeammates = data.teammates || [];
        localStorage.setItem('currentUser', JSON.stringify(user));

        updateWelcomeName(user);

        const targetClass = data.user.className || data.user.chidoan;
        renderOpenedState(targetClass);
        triggerConfetti();
        showLetter();
      }, 1000);

    } catch (err) {
      chestWrapper.classList.remove('shaking');
      console.error('Lỗi kết nối:', err);
      alert('Không thể kết nối đến máy chủ!');
    }
  }

  function renderOpenedState(className) {
    document.getElementById('treasureChest').classList.add('open');
    document.getElementById('instructionText').innerText = `Chi đoàn: ${className || 'Đã nhận phân công'} ✨ (Chạm rương để xem lại)`;
    document.getElementById('reopenContainer').classList.remove('hidden');
  }

  function renderClosedState() {
    document.getElementById('treasureChest').classList.remove('open');
    document.getElementById('instructionText').innerText = 'Chạm vào Rương Báu để mở Lá Thư Phân Công!';
    document.getElementById('reopenContainer').classList.add('hidden');
    closeLetter();
  }

  // 4. RENDER NỘI DUNG LÁ THƯ
  function showLetter() {
    const targetClass = user.className || user.chidoan || 'Chưa phân công';
    document.getElementById('letterClass').innerText = targetClass;
    
    const myHoly = user.holyName || user.holyname ? (user.holyName || user.holyname) + ' ' : '';
    const myName = user.fullname || user.fullName || user.name || '';
    document.getElementById('letterHolyName').innerText = myHoly;
    document.getElementById('letterFullname').innerText = myName;
    document.getElementById('letterSubrole').innerText = user.subrole ? `(${user.subrole})` : '';

    // Render danh sách Anh/Chị cùng lớp
    const teammatesListEl = document.getElementById('teammatesList');
    teammatesListEl.innerHTML = '';

    const validTeammates = (currentTeammates || []).filter(mate => {
      const mateId = mate._id || mate.id;
      const myId = user._id || user.id;
      if (mateId && myId) return mateId !== myId;

      const mateName = (mate.fullname || mate.fullName || mate.name || '').trim().toLowerCase();
      return mateName !== myName.trim().toLowerCase();
    });

    if (validTeammates.length > 0) {
      validTeammates.forEach(mate => {
        const li = document.createElement('li');
        const holy = mate.holyName || mate.holyname ? `${mate.holyName || mate.holyname} ` : '';
        const name = mate.fullname || mate.fullName || mate.name || '';

        // 🌟 BỎ CHỮ CHI ĐOÀN CHƯA XẾP BẰNG LOGIC KIỂM TRA
        const rawRole = mate.subrole || mate.chidoan || '';
        const isUnassignedRole = !rawRole || rawRole.toLowerCase().includes('chưa xếp') || rawRole.toLowerCase().includes('chua xep');
        
        const role = (!isUnassignedRole && rawRole !== '—') ? ` — <i>${rawRole}</i>` : '';

        li.innerHTML = `• ${holy}<b>${name}</b>${role}`;
        teammatesListEl.appendChild(li);
      });
    } else {
      teammatesListEl.innerHTML = '<li><i>Chưa có thành viên khác trong lớp</i></li>';
    }

    document.getElementById('letterOverlay').classList.remove('hidden');
  }

  function closeLetter() {
    document.getElementById('letterOverlay').classList.add('hidden');
  }

  function triggerConfetti() {
    if (typeof confetti === 'function') {
      confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
    }
  }

  function logout() {
    localStorage.removeItem('currentUser');
    window.location.href = 'login.html';
  }

  checkCurrentStatus();
</script>
</body>
</html>
